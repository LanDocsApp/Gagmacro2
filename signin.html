<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — GAG Seed Buyer</title>
  <meta name="description" content="Sign in to get your GAG Seed Buyer access code." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:        #16a34a;
      --accent-hover:  #15803d;
      --bg:            #ffffff;
      --bg-soft:       #fafafa;
      --bg-muted:      #f5f5f5;
      --border:        #e0e0e0;
      --border-strong: #cccccc;
      --ink:           #0a0a0a;
      --ink-hover:     #333333;
      --fg:            #111111;
      --fg-2:          #555555;
      --fg-3:          #777777;
      --fg-4:          #888888;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      color: var(--fg);
      background: var(--bg-soft);
      line-height: 1.5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.03);
      text-align: center;
    }
    .mark { width: 44px; height: 44px; border-radius: 11px; display: block; margin: 0 auto 22px; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 8px; }
    p.sub { color: var(--fg-2); margin-bottom: 26px; font-size: 14.5px; line-height: 1.55; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
      font: 500 14.5px var(--font-sans);
      padding: 12px 18px; border-radius: 9px;
      border: 1px solid var(--border-strong); background: #fff; color: #3c4043;
      cursor: pointer; text-decoration: none;
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn:hover { background: var(--bg-muted); border-color: var(--border-strong); }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn.ink { background: var(--ink); color: #fff; border-color: var(--ink); }
    .btn.ink:hover { background: var(--ink-hover); border-color: var(--ink-hover); }
    .btn + .btn { margin-top: 10px; }
    .gicon { width: 18px; height: 18px; }

    .who { font-size: 14px; color: var(--fg-2); margin-bottom: 22px; }
    .who b { color: var(--fg); font-weight: 600; }

    .msg { font-size: 13.5px; padding: 11px 13px; border-radius: 9px; margin-bottom: 22px; text-align: left; line-height: 1.45; }
    .msg.err { background: #ffebee; color: #b71c1c; border: 1px solid #ef9a9a; }
    .msg.info { background: #fff8e1; color: #92510a; border: 1px solid #ffe082; }

    .price { font-size: 12.5px; color: var(--fg-4); margin-top: 18px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; color: var(--fg-4); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    .home { display: inline-block; margin-top: 20px; font-size: 13px; color: var(--fg-3); text-decoration: none; transition: color .12s; }
    .home:hover { color: var(--fg); }
    .legal { margin-top: 14px; font-size: 12px; color: var(--fg-4); line-height: 1.5; }
    .legal a { color: var(--fg-3); text-decoration: underline; transition: color .12s; }
    .legal a:hover { color: var(--fg); }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="64" height="64" rx="14" fill="#16a34a"></rect>
      <path d="M32 52 V30" stroke="#fff" stroke-width="3.6" stroke-linecap="round"></path>
      <path d="M32 36 C22 36 17 28 18 19 C28 20 33 27 32 36 Z" fill="#fff"></path>
      <path d="M32 40 C42 40 47 32 46 23 C36 24 31 31 32 40 Z" fill="#fff"></path>
    </svg>

    <div id="msg" class="msg" hidden></div>

    <!-- Signed-out state -->
    <div id="signedOut">
      <h1>Sign in to get your code</h1>
      <p class="sub">Use your Google account. After you subscribe you'll get a paste-code for the launcher.</p>
      <a class="btn" href="/api/auth/google/login">
        <svg class="gicon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.5 13.2l7.9 6.1C12.3 13.3 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7C43.7 38 46.5 31.9 46.5 24.5z"/>
          <path fill="#FBBC05" d="M10.4 28.3c-.5-1.5-.8-3.1-.8-4.8s.3-3.3.8-4.8l-7.9-6.1C.9 16 0 19.9 0 23.5s.9 7.5 2.5 10.9l7.9-6.1z"/>
          <path fill="#34A853" d="M24 47c6.3 0 11.6-2.1 15.5-5.7l-7.3-5.7c-2 1.4-4.7 2.3-8.2 2.3-6.3 0-11.7-3.8-13.6-9.3l-7.9 6.1C6.4 42.6 14.6 47 24 47z"/>
        </svg>
        Continue with Google
      </a>
      <p class="price">$4.50 / month · cancel anytime</p>
    </div>

    <!-- Signed-in state -->
    <div id="signedIn" hidden>
      <h1>Welcome back</h1>
      <p class="who">Signed in as <b id="email"></b></p>
      <a class="btn ink" href="/api/checkout">Get your access code →</a>
      <a class="btn" href="/api/auth/google/login">Switch account</a>
    </div>

    <a class="home" href="/index.html">← Back to home</a>
    <p class="legal">By continuing you agree to our <a href="/privacy.html">Privacy Policy</a>.</p>
  </div>

  <script>
    // Display-only cookie set by the OAuth callback — purely for greeting the
    // user. Real auth is the HttpOnly signed session cookie checked server-side.
    function getCookie(name) {
      return document.cookie.split(";").map(c => c.trim()).reduce((acc, c) => {
        const i = c.indexOf("=");
        if (i > -1 && c.slice(0, i) === name) acc = decodeURIComponent(c.slice(i + 1));
        return acc;
      }, "");
    }

    const email = getCookie("gag_user");
    if (email) {
      document.getElementById("email").textContent = email;
      document.getElementById("signedOut").hidden = true;
      document.getElementById("signedIn").hidden = false;
    }

    const params = new URLSearchParams(location.search);
    const msg = document.getElementById("msg");
    const errors = {
      state: "Your sign-in link expired. Please try again.",
      auth: "Sign-in was interrupted. Please try again.",
      denied: "Sign-in was cancelled.",
      exchange: "Couldn't complete sign-in with Google. Please try again.",
      profile: "Couldn't read your Google profile. Please try again.",
      checkout: "Couldn't start checkout. Please try again in a moment."
    };
    if (params.has("error")) {
      msg.textContent = errors[params.get("error")] || "Something went wrong. Please try again.";
      msg.classList.add("err");
      msg.hidden = false;
    } else if (params.get("checkout") === "cancelled") {
      msg.textContent = "Checkout cancelled — you can subscribe whenever you're ready.";
      msg.classList.add("info");
      msg.hidden = false;
    }
  </script>
</body>
</html>
