<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <title>Giveaway - Garden Macro</title>
  <meta name="description" content="Win free Grow a Garden seeds. Sign in, subscribe to White Lion, and enter." />

  <!-- Social share preview (Open Graph + Twitter). Static because giveaway.html serves one
       giveaway at a time; update the title/description/image if you swap the prize. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Garden Macro" />
  <meta property="og:title" content="Win 10x Moon Bloom Seeds" />
  <meta property="og:description" content="Enter the giveaway and have a chance to win 10x Moon Bloom Seeds in Grow a Garden. Free to enter." />
  <meta property="og:url" content="https://gardenmacro.com/giveaway" />
  <meta property="og:image" content="https://gardenmacro.com/og-giveaway.png?v=1" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Win 10x Moon Bloom Seeds" />
  <meta name="twitter:description" content="Enter the giveaway and have a chance to win 10x Moon Bloom Seeds in Grow a Garden. Free to enter." />
  <meta name="twitter:image" content="https://gardenmacro.com/og-giveaway.png?v=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ---- Design tokens (shared with signin.html / index.html). Restyle here. ---- */
    :root {
      --accent:        #16a34a;
      --accent-hover:  #15803d;
      --accent-soft:   #f0fdf4;
      --accent-line:   #bbf7d0;
      --bg:            #ffffff;
      --bg-soft:       #fafafa;
      --bg-muted:      #f5f5f5;
      --border:        #e0e0e0;
      --border-strong: #cccccc;
      --ink:           #0a0a0a;
      --fg:            #111111;
      --fg-2:          #555555;
      --fg-3:          #777777;
      --fg-4:          #888888;
      --err-bg:        #ffebee;
      --err-fg:        #b71c1c;
      --err-line:      #ef9a9a;
      --radius:        14px;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans); color: var(--fg); background: var(--bg-soft);
      line-height: 1.5; min-height: 100vh; padding: 28px 20px 56px;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    a { color: inherit; }
    .wrap { max-width: 620px; width: 100%; margin: 0 auto; }

    /* Header */
    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand svg { width: 30px; height: 30px; border-radius: 8px; }
    .brand span { font-weight: 700; font-size: 15px; color: var(--ink); letter-spacing: -0.01em; }
    .top-link { font-size: 13px; color: var(--fg-3); text-decoration: none; }
    .top-link:hover { color: var(--fg); }

    /* ---- Landing ---- */
    .landing { text-align: center; padding-top: 30px; }
    .count-label { font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 20px; }
    .count { display: flex; justify-content: center; gap: 26px; }
    .count .u { text-align: center; min-width: 58px; }
    .count .n { font-family: var(--font-mono); font-size: 62px; font-weight: 700; color: var(--ink);
                font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -0.03em; }
    .count .l { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-4); margin-top: 12px; }
    .ended-badge { font-weight: 800; color: var(--err-fg); font-size: 22px; padding: 10px 0; }

    /* Seed on a soft glow, no frame, transparent background */
    .seed { position: relative; display: grid; place-items: center; margin: 40px 0 4px; height: 260px; }
    .seed-glow { position: absolute; width: 320px; height: 320px; border-radius: 50%; z-index: 0;
                 background: radial-gradient(circle, rgba(22,163,74,0.34), rgba(22,163,74,0.10) 46%, transparent 70%);
                 filter: blur(20px); }
    .seed img, .seed .seed-svg { position: relative; z-index: 1; width: 248px; height: 248px; object-fit: contain;
                 filter: drop-shadow(0 14px 26px rgba(0,0,0,0.18)); }
    /* Custom image (with its own background): no glow, no shadow, render flat and large,
       at its natural aspect ratio (not squeezed into the 248px seed box). */
    .seed.seed-plain { height: auto; margin: 16px 0 34px; }
    .seed.seed-plain img { filter: none; width: 100%; max-width: 540px; height: auto; }

    .prize-title { font-size: 30px; font-weight: 800; letter-spacing: -0.025em; color: var(--ink); margin-top: 8px; line-height: 1.1; }
    .prize-sub { font-size: 14.5px; color: var(--fg-2); margin: 8px auto 0; max-width: 440px; }
    .enter-cta { margin-top: 28px; }
    /* Quiet social-proof line under the CTA. Static text, no dots, no animation. */
    .entrants { margin-top: 16px; font-size: 13px; font-weight: 500; color: var(--fg-3); }
    .entrants b { font-weight: 700; color: var(--fg-2); font-variant-numeric: tabular-nums; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      font: 600 14px var(--font-sans); padding: 12px 16px; border-radius: 10px;
      border: 1px solid var(--border-strong); background: #fff; color: #3c4043;
      cursor: pointer; text-decoration: none; transition: background .15s, border-color .15s, color .15s, opacity .15s;
    }
    .btn:hover { background: var(--bg-muted); }
    .btn.block { display: flex; width: 100%; }
    .btn.big { font-size: 16px; padding: 15px 26px; border-radius: 12px; }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn.ink { background: var(--ink); color: #fff; border-color: var(--ink); }
    .btn.ink:hover { background: #333; }
    .btn.yt { background: #ff0000; color: #fff; border-color: #ff0000; }
    .btn.yt:hover { background: #d90000; border-color: #d90000; }
    .btn:disabled, .btn.disabled { cursor: not-allowed; pointer-events: none; opacity: .55; }
    /* Disabled cue via colour, not opacity, so the reveal animation (which holds opacity:1) can't un-gray it */
    .btn.primary:disabled, .btn.primary.disabled { opacity: 1; background: #bfe3cb; border-color: #bfe3cb; color: #f4fff8; }
    .btn .icon { width: 18px; height: 18px; }
    .mt14 { margin-top: 14px; }

    /* ---- Modal ---- */
    .overlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
               padding: 18px; background: rgba(10,10,10,0.55); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); }
    .modal { position: relative; width: 100%; max-width: 468px; max-height: calc(100vh - 36px); overflow-y: auto;
             background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 34px 28px 28px;
             box-shadow: 0 30px 80px rgba(0,0,0,0.30); animation: modalIn .18s ease; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(10px) scale(.985); } to { opacity: 1; transform: none; } }
    /* Staggered reveal: each line of a card fades up in reading order (delay set in JS) */
    @keyframes revealUp { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }
    .reveal { animation: revealUp .40s cubic-bezier(.2,.7,.3,1) both; }
    .modal-close { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 9px;
                   border: 1px solid var(--border); background: #fff; color: var(--fg-3); cursor: pointer; display: grid; place-items: center; }
    .modal-close:hover { background: var(--bg-muted); color: var(--fg); }
    .modal-close svg { width: 16px; height: 16px; }

    /* ---- Wizard ---- */
    .wz-back { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer;
               font: 600 13px var(--font-sans); color: var(--fg-3); padding: 0; margin-bottom: 16px; }
    .wz-back:hover { color: var(--fg); }
    .wz-back svg { width: 14px; height: 14px; }
    .wz-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .wz-title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: var(--ink); line-height: 1.15; }
    .wz-text { font-size: 14px; color: var(--fg-2); margin-top: 8px; line-height: 1.55; }
    .wz-text .lnk, .lnk { color: var(--accent-hover); font-weight: 600; text-decoration: none; }
    .wz-text .lnk:hover, .lnk:hover { text-decoration: underline; }
    .wz-actions { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
    .wz-hint { text-align: center; font-size: 12px; color: var(--fg-4); margin-top: 12px; min-height: 15px; }
    .wz-skip { display: block; width: 100%; text-align: center; margin-top: 14px; padding: 4px;
               background: none; border: none; cursor: pointer; font: 500 13px var(--font-sans); color: var(--fg-4); }
    .wz-skip:hover { color: var(--fg-2); text-decoration: underline; }
    /* "Don't have the macro yet?" separator above the big download button. */
    .dl-sep { text-align: center; font-size: 12.5px; font-weight: 500; color: var(--fg-3); margin: 22px 0 10px; }
    .sub-note { font-size: 12.5px; color: var(--accent-hover); font-weight: 600; margin-top: 12px; }

    .check { display: flex; align-items: flex-start; gap: 9px; margin-top: 14px; cursor: pointer; font-size: 14px; color: var(--fg); }
    .check input { margin-top: 2px; width: 17px; height: 17px; accent-color: var(--accent); flex: 0 0 auto; }

    input[type=text] {
      width: 100%; font: 600 16px var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase;
      padding: 13px 14px; border: 1px solid var(--border-strong); border-radius: 10px; background: #fff; color: var(--ink);
    }
    input[type=text]::placeholder { letter-spacing: normal; text-transform: none; font-weight: 500; color: var(--fg-4); }
    input[type=text]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    /* Username field: a normal name, not a code, so plain sans, no uppercasing/spacing. */
    input[type=text].input-plain { font-family: var(--font-sans); font-weight: 500; letter-spacing: normal; text-transform: none; }
    input[type=text].input-plain::placeholder { font-weight: 500; }

    .err { background: var(--err-bg); color: var(--err-fg); border: 1px solid var(--err-line); border-radius: 9px; padding: 9px 12px; font-size: 13px; margin-top: 10px; }

    /* Pro discount code chip */
    .promo-code { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px;
                  border: 1px dashed var(--accent-line); background: var(--accent-soft); border-radius: 11px; padding: 11px 12px 11px 14px; }
    .promo-code .label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
    .promo-code .code { font: 700 17px var(--font-mono); letter-spacing: 0.1em; color: var(--accent-hover); margin-top: 2px; }
    .copy-btn { font: 600 12.5px var(--font-sans); border: 1px solid var(--border-strong); background: #fff; color: var(--fg);
                border-radius: 8px; padding: 8px 12px; cursor: pointer; white-space: nowrap; }
    .copy-btn:hover { background: var(--bg-muted); }

    /* Confirmation */
    .confirm { text-align: center; padding: 6px 0 2px; }
    .confirm .tick { width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 50%; background: var(--accent-soft); border: 1px solid var(--accent-line); display: grid; place-items: center; }
    .confirm .tick svg { width: 30px; height: 30px; stroke: var(--accent); }

    .foot { text-align: center; margin-top: auto; padding-top: 40px; font-size: 12px; color: var(--fg-4); line-height: 1.7; }
    .foot a { color: var(--fg-3); text-decoration: underline; }
    .rules { font-size: 11.5px; color: var(--fg-4); }

    .skeleton { color: var(--fg-4); text-align: center; padding: 60px 0; font-size: 14px; }
    [hidden] { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      .reveal, .modal { animation: none !important; }
    }
    @media (max-width: 520px) {
      .count { gap: 14px; }
      .count .u { min-width: 44px; }
      .count .n { font-size: 46px; }
      .seed { height: 220px; }
      .seed img, .seed .seed-svg { width: 200px; height: 200px; }
      .prize-title { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/index.html">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="64" height="64" rx="14" fill="#16a34a"></rect>
          <path d="M32 52 V30" stroke="#fff" stroke-width="3.6" stroke-linecap="round"></path>
          <path d="M32 36 C22 36 17 28 18 19 C28 20 33 27 32 36 Z" fill="#fff"></path>
          <path d="M32 40 C42 40 47 32 46 23 C36 24 31 31 32 40 Z" fill="#fff"></path>
        </svg>
        <span>Garden Macro</span>
      </a>
      <a class="top-link" href="/index.html">Home</a>
    </div>

    <div id="app">
      <div class="skeleton">Loading giveaway...</div>
    </div>
  </div>

  <p class="foot">
    <span class="rules" id="rulesLine">One entry per Google account. The winner is drawn at random, weighted by entries, and contacted by email.</span><br>
    Not affiliated with Roblox or YouTube. Need help? <a href="mailto:janmarko659@gmail.com">janmarko659@gmail.com</a>
  </p>

  <!-- Entry wizard modal (hidden until "Enter giveaway" is pressed) -->
  <div class="overlay" id="overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    "use strict";
    var params = new URLSearchParams(location.search);
    var GID = (params.get("g") || "").trim();
    var app = document.getElementById("app");
    var overlay = document.getElementById("overlay");
    var modalBody = document.getElementById("modalBody");

    var state = null;         // last /api/giveaway payload
    var countdownTimer = null;

    // Wizard state (reset each time the modal opens fresh).
    var wizScreen = "subscribe";
    var subClicked = false;   // the Subscribe link was actually pressed (mandatory)
    var subChecked = false;   // the "I subscribed" box is ticked (mandatory)
    var gagUsername = "";     // Grow a Garden (Roblox) username, for prize delivery (mandatory)
    var wantBonus = null;     // answer to "want 2 more entries?"
    var macroCode = "";       // validated macro code (empty if none)
    var codeValidated = false;

    function validUsername(u) { return /^[A-Za-z0-9_]{3,20}$/.test(String(u || "").trim()); }

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }
    function el(id) { return document.getElementById(id); }

    // ---- Load + render landing -------------------------------------------
    function fetchState() {
      var q = GID ? "?g=" + encodeURIComponent(GID) : "";
      return fetch("/api/giveaway" + q, { credentials: "same-origin", cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(r); })
        .then(function (d) { state = d; GID = d.id; return d; });
    }

    function load() {
      fetchState()
        .then(function () { render(); maybeAutoOpen(); startPoll(); })
        .catch(function () {
          app.innerHTML = '<div class="skeleton">Could not load this giveaway. Please refresh.</div>';
        });
    }

    function render() {
      var g = state, me = g.me || {};
      var html = '<div class="landing">';

      if (g.ended) {
        html += '<div class="ended-badge">This giveaway has ended</div>';
      } else {
        html += '<div class="count-label">Giveaway ends in</div>' +
          '<div class="count">' +
            unit("cd-d", "Days") + unit("cd-h", "Hours") + unit("cd-m", "Mins") + unit("cd-s", "Secs") +
          '</div>';
      }

      html += seedHtml(g) +
        '<div class="prize-title">' + esc(g.title) + '</div>' +
        (g.prize ? '<div class="prize-sub">' + esc(g.prize) + '</div>' : "");

      // Call to action.
      var label = g.winnerDrawn ? "See results" : (me.entered ? "You are entered" : "Enter giveaway");
      if (!(g.ended && !g.winnerDrawn)) {
        html += '<div class="enter-cta"><button class="btn primary big" id="openEntry">' + label + '</button></div>';
      }
      html += entrantsLine(g);
      html += '</div>';

      app.innerHTML = html;

      var openBtn = el("openEntry");
      if (openBtn) openBtn.onclick = onEnterClick;
      if (!g.ended) startCountdown(g.endsAt);
    }

    function unit(id, label) {
      return '<div class="u"><div class="n" id="' + id + '">00</div><div class="l">' + label + '</div></div>';
    }

    // Quiet count of how many have entered (uses g.entrants from /api/giveaway). Hidden once
    // the giveaway is over. Reads "Be the first to enter" while empty so the line is never blank.
    function entrantsLine(g) {
      if (g.ended || g.winnerDrawn) return "";
      var n = g.entrants || 0;
      var txt = n <= 0
        ? "Be the first to enter"
        : "<b>" + n + "</b> " + (n === 1 ? "person has" : "people have") + " entered";
      return '<div class="entrants">' + txt + "</div>";
    }

    function seedHtml(g) {
      // Custom image already has its own background, so it renders flat (no glow, no shadow).
      // The built-in SVG placeholder keeps the soft green glow.
      if (g.image) {
        return '<div class="seed seed-plain"><img src="' + esc(g.image) + '" alt="' + esc(g.title) + '"></div>';
      }
      var svg = '<svg class="seed-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
            '<path d="M32 58 V30" stroke="#16a34a" stroke-width="4" stroke-linecap="round"></path>' +
            '<path d="M32 38 C20 38 14 28 15 17 C27 18 33 27 32 38 Z" fill="#16a34a"></path>' +
            '<path d="M32 42 C44 42 50 32 49 21 C37 22 31 31 32 42 Z" fill="#16a34a"></path></svg>';
      return '<div class="seed"><div class="seed-glow"></div>' + svg + '</div>';
    }

    function onEnterClick() {
      var me = state.me || {};
      if (!me.signedIn) { signInToEnter(); return; }
      openModal();
    }

    function signInToEnter() {
      // Sign in with Google, then come straight back and open the wizard (#enter).
      var path = "/giveaway.html?g=" + encodeURIComponent(GID) + "#enter";
      document.cookie = "gag_return=" + path + "; Max-Age=1800; Path=/; SameSite=Lax; Secure";
      location.href = "/api/auth/google/login";
    }

    // ---- Modal open/close ------------------------------------------------
    function openModal() {
      var me = state.me || {};
      if (!(me.entered)) {
        // Fresh run through the steps.
        wizScreen = "subscribe";
        subClicked = false; subChecked = false;
        gagUsername = me.username || "";
        wantBonus = null; macroCode = ""; codeValidated = false;
      }
      overlay.hidden = false;
      document.body.style.overflow = "hidden";
      renderModalBody();
    }
    function closeModal() {
      overlay.hidden = true;
      document.body.style.overflow = "";
    }
    function maybeAutoOpen() {
      if (location.hash === "#enter" && state.me && state.me.signedIn) {
        history.replaceState(null, "", location.pathname + location.search);
        openModal();
      }
    }

    overlay.addEventListener("click", function (e) { if (e.target === overlay) closeModal(); });
    document.addEventListener("keydown", function (e) { if (e.key === "Escape" && !overlay.hidden) closeModal(); });
    el("modalClose").onclick = closeModal;

    // ---- Modal body (wizard + confirmation states) -----------------------
    function renderModalBody() {
      modalBody.innerHTML = entryPanel(state);
      wireModal();
      animateReveal();
    }

    // Fade each line of the current card up, in reading order, so the user's eye is
    // walked through what to do. Containers (.wz-actions, .confirm) reveal their
    // children individually rather than as one block.
    function animateReveal() {
      var order = [];
      Array.prototype.forEach.call(modalBody.children, function (child) {
        if (child.classList.contains("wz-actions") || child.classList.contains("confirm")) {
          Array.prototype.forEach.call(child.children, function (g) { order.push(g); });
        } else {
          order.push(child);
        }
      });
      order.forEach(function (node, i) {
        node.classList.add("reveal");
        node.style.animationDelay = (i * 75) + "ms";
      });
    }

    function entryPanel(g) {
      var me = g.me || { signedIn: false };

      if (g.winnerDrawn) return winnerScreen(g, me);
      if (me.entered)    return enteredScreen(g, me);

      // Live entry wizard.
      if (wizScreen === "subscribe") return screenSubscribe(g);
      if (wizScreen === "username")  return screenUsername(g);
      if (wizScreen === "bonus")     return screenBonus(g);
      if (wizScreen === "code")      return screenCode(g);
      return screenPro(g, me);
    }

    // Step 1 -- subscribe (mandatory: press the link AND tick the box).
    function screenSubscribe(g) {
      var canGo = subClicked && subChecked;
      return '<div class="wz-eyebrow">Step 1</div>' +
        '<div class="wz-title">Subscribe to White Lion</div>' +
        '<a class="btn yt block mt14" id="subBtn" href="' + esc(g.subscribeUrl) + '" target="_blank" rel="noopener">' +
          ytIcon() + ' Subscribe to White Lion</a>' +
        (subClicked ? '<div class="sub-note">Opened YouTube. Subscribe there, then tick the box below.</div>' : "") +
        '<label class="check"><input type="checkbox" id="subCheck"' + (subChecked ? " checked" : "") + '> I subscribed to White Lion</label>' +
        '<div class="wz-actions">' +
          '<button class="btn primary block' + (canGo ? "" : " disabled") + '" id="subContinue"' + (canGo ? "" : " disabled") + '>Continue</button>' +
        '</div>' +
        '<div class="wz-hint" id="subHint">' + subHintText() + '</div>';
    }
    function subHintText() {
      if (!subClicked) return "Press the Subscribe button first.";
      if (!subChecked) return "Tick the box to confirm you subscribed.";
      return "";
    }

    // Step 2 -- Grow a Garden username (mandatory: this is where the prize is delivered).
    function screenUsername(g) {
      var canGo = validUsername(gagUsername);
      return backBtn() +
        '<div class="wz-eyebrow">Step 2</div>' +
        '<div class="wz-title">Your Grow a Garden username</div>' +
        '<div class="wz-text">Enter your Roblox username so we can send you the seeds in Grow a Garden if you win. ' +
          'Type it exactly as it appears in game.</div>' +
        '<input type="text" id="userInput" class="input-plain mt14" maxlength="20" placeholder="Roblox username" ' +
          'spellcheck="false" autocomplete="off" autocapitalize="off" value="' + esc(gagUsername) + '">' +
        '<div id="userMsg"></div>' +
        '<div class="wz-actions"><button class="btn primary block' + (canGo ? "" : " disabled") + '" id="userContinue"' +
          (canGo ? "" : " disabled") + '>Continue</button></div>' +
        '<div class="wz-hint" id="userHint">' + (canGo ? "" : "Enter your exact Roblox username to continue.") + '</div>';
    }

    // Step 3 -- offer 2 more entries.
    function screenBonus(g) {
      return backBtn() +
        '<div class="wz-eyebrow">Step 3</div>' +
        '<div class="wz-title">Want 2 more entries?</div>' +
        '<div class="wz-text">Enter the free macro code to add 2 extra entries to this giveaway.</div>' +
        '<div class="wz-actions">' +
          '<button class="btn primary block" id="bonusYes">Yes, add 2 entries</button>' +
          '<button class="btn block" id="bonusNo">No thanks</button>' +
        '</div>';
    }

    // Step 3b -- enter + validate the macro code.
    function screenCode(g) {
      return backBtn() +
        '<div class="wz-eyebrow">Step 3</div>' +
        '<div class="wz-title">Enter the macro code</div>' +
        '<div class="wz-text">Open the macro and copy the code from the bottom corner of the window.</div>' +
        '<input type="text" id="codeInput" class="mt14" maxlength="16" placeholder="Enter macro code" spellcheck="false" autocomplete="off" value="' + esc(macroCode) + '">' +
        '<div id="codeMsg"></div>' +
        '<div class="wz-actions"><button class="btn primary block' + (macroCode ? "" : " disabled") + '" id="codeContinue"' + (macroCode ? "" : " disabled") + '>Continue</button></div>' +
        '<div class="dl-sep">Do not have the macro yet?</div>' +
        '<a class="btn primary big block" id="dlMacro" href="/launcher.ahk" download>' + dlIcon() + ' Download the macro free</a>' +
        '<button class="wz-skip" id="codeSkip">Skip, I do not have the macro</button>';
    }

    // Final step -- Pro. Confirmation for Pro members, upsell for everyone else.
    function screenPro(g, me) {
      if (me.isPro) {
        return backBtn() +
          '<div class="wz-eyebrow">Almost done</div>' +
          '<div class="wz-title">You have Pro</div>' +
          '<div class="wz-text">You are entering with ' + g.weights.pro + ' entries, the maximum for this giveaway.</div>' +
          '<div class="wz-actions"><button class="btn primary block" id="enterBtn">Enter giveaway</button></div>' +
          '<div id="enterErr"></div>';
      }
      var n = codeValidated ? g.weights.macro : g.weights.base;
      var nLabel = n + (n === 1 ? " entry" : " entries");
      return backBtn() +
        '<div class="wz-eyebrow">Last step</div>' +
        '<div class="wz-title">Get ' + g.weights.pro + ' entries with Pro</div>' +
        '<div class="wz-text">Garden Macro Pro puts you in with ' + g.weights.pro + ' entries, the best odds in this giveaway, and unlocks the full macro.</div>' +
        promoCodeChip() +
        '<div class="wz-actions">' +
          '<a class="btn primary block" href="/api/checkout">Get Garden Macro Pro</a>' +
          '<button class="btn block" id="skipEnter">Skip and enter with ' + nLabel + '</button>' +
        '</div>' +
        '<div id="enterErr"></div>';
    }

    function promoCodeChip() {
      return '<div class="promo-code">' +
        '<div><div class="label">30% off with code</div><div class="code" id="promoCode">GIVEAWAY</div></div>' +
        '<button class="copy-btn" id="copyPromo">Copy</button></div>';
    }

    // Already entered -- confirmation (+ Pro upsell for non-Pro).
    function enteredScreen(g, me) {
      var out = '<div class="confirm">' + tickSvg() +
        '<div class="wz-title" style="text-align:center">You are entered</div>' +
        '<div class="wz-text" style="text-align:center">You are in with ' + me.weight + (me.weight === 1 ? " entry" : " entries") +
        '. We will email ' + esc(me.email) + ' if you win' +
        (me.username ? ' and deliver the prize to Roblox user <b>' + esc(me.username) + '</b>' : '') +
        '.</div></div>';
      if (!me.isPro) {
        out += '<div class="wz-text" style="margin-top:20px">Want the best odds? Garden Macro Pro gives you ' + g.weights.pro + ' entries.</div>' +
          promoCodeChip() +
          '<div class="wz-actions">' +
            '<a class="btn primary block" href="/api/checkout">Get Garden Macro Pro</a>' +
            '<button class="btn block" id="doneBtn">Done</button>' +
          '</div>';
      } else {
        out += '<div class="wz-actions"><button class="btn primary block" id="doneBtn">Done</button></div>';
      }
      return out;
    }

    function winnerScreen(g, me) {
      if (me.signedIn && me.won) {
        return '<div class="confirm">' + tickSvg() +
          '<div class="wz-title" style="text-align:center">You won</div>' +
          '<div class="wz-text" style="text-align:center">Check the inbox for ' + esc(me.email) +
          '. We will email you about your prize. If you did not actually subscribe to White Lion, the prize goes to someone who did.</div></div>' +
          '<div class="wz-actions"><button class="btn primary block" id="doneBtn">Done</button></div>';
      }
      return '<div class="confirm">' + tickSvg() +
        '<div class="wz-title" style="text-align:center">A winner has been drawn</div>' +
        '<div class="wz-text" style="text-align:center">The winner has been emailed. Thanks for entering. More giveaways are on the way.</div></div>' +
        '<div class="wz-actions"><button class="btn block" id="doneBtn">Done</button></div>';
    }

    function backBtn() {
      return '<button class="wz-back" id="wzBack">' +
        '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l-6 6 6 6"/></svg> Back</button>';
    }

    // ---- Wiring ----------------------------------------------------------
    function wireModal() {
      var me = state.me || {};

      var subBtn = el("subBtn");
      if (subBtn) subBtn.onclick = function () { subClicked = true; setTimeout(renderModalBody, 0); };

      var subCheck = el("subCheck");
      if (subCheck) subCheck.onchange = function () { subChecked = subCheck.checked; updateSubGate(); };

      var subContinue = el("subContinue");
      if (subContinue) subContinue.onclick = function () {
        if (!(subClicked && subChecked)) return;
        navTo("username");
      };

      var userInput = el("userInput");
      if (userInput) {
        userInput.oninput = function () {
          gagUsername = userInput.value;
          var b = el("userContinue"), ok = validUsername(gagUsername);
          if (b) { b.disabled = !ok; b.classList.toggle("disabled", !ok); }
          var h = el("userHint"); if (h) h.textContent = ok ? "" : "Enter your exact Roblox username to continue.";
        };
        userInput.onkeydown = function (e) { if (e.key === "Enter") { var b = el("userContinue"); if (b && !b.disabled) b.click(); } };
      }
      var userContinue = el("userContinue");
      if (userContinue) userContinue.onclick = function () {
        if (userContinue.disabled) return;
        gagUsername = (userInput ? userInput.value : gagUsername).trim();
        if (!validUsername(gagUsername)) return;
        navTo(me.isPro ? "pro" : "bonus");
      };

      var wzBack = el("wzBack");
      if (wzBack) wzBack.onclick = goBack;

      var bonusYes = el("bonusYes");
      if (bonusYes) bonusYes.onclick = function () { wantBonus = true; navTo("code"); };
      var bonusNo = el("bonusNo");
      if (bonusNo) bonusNo.onclick = function () { wantBonus = false; macroCode = ""; codeValidated = false; navTo("pro"); };

      var codeInput = el("codeInput");
      if (codeInput) codeInput.oninput = function () {
        var b = el("codeContinue");
        if (!b) return;
        var ok = codeInput.value.trim().length > 0;
        b.disabled = !ok; b.classList.toggle("disabled", !ok);
      };
      var codeContinue = el("codeContinue");
      if (codeContinue) codeContinue.onclick = function () { if (!codeContinue.disabled) validateCode(); };
      var codeSkip = el("codeSkip");
      if (codeSkip) codeSkip.onclick = function () { wantBonus = false; macroCode = ""; codeValidated = false; navTo("pro"); };

      var copyPromo = el("copyPromo");
      if (copyPromo) copyPromo.onclick = function () { copyText("GIVEAWAY", copyPromo); };

      var skipEnter = el("skipEnter");
      if (skipEnter) skipEnter.onclick = function () { submitEntry(skipEnter); };
      var enterBtn = el("enterBtn");
      if (enterBtn) enterBtn.onclick = function () { submitEntry(enterBtn); };

      var doneBtn = el("doneBtn");
      if (doneBtn) doneBtn.onclick = closeModal;
    }

    function updateSubGate() {
      var b = el("subContinue");
      if (b) { var ok = subClicked && subChecked; b.disabled = !ok; b.classList.toggle("disabled", !ok); }
      var h = el("subHint");
      if (h) h.textContent = subHintText();
    }

    function navTo(screen) { wizScreen = screen; renderModalBody(); }

    function goBack() {
      var me = state.me || {};
      if (wizScreen === "username") navTo("subscribe");
      else if (wizScreen === "bonus") navTo("username");
      else if (wizScreen === "code") navTo("bonus");
      else if (wizScreen === "pro") navTo(me.isPro ? "username" : (codeValidated ? "code" : "bonus"));
    }

    function validateCode() {
      var input = el("codeInput");
      var code = (input && input.value || "").trim();
      var btn = el("codeContinue");
      if (!code) { showCodeMsg("Enter the code from the macro."); return; }
      btn.disabled = true; btn.textContent = "Checking...";
      fetch("/api/giveaway/check-code?code=" + encodeURIComponent(code), { cache: "no-store" })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d && d.valid) { macroCode = code.toUpperCase(); codeValidated = true; navTo("pro"); }
          else { showCodeMsg("That code is invalid. Copy it from the bottom corner of the macro."); btn.disabled = false; btn.textContent = "Continue"; }
        })
        .catch(function () { showCodeMsg("Network error, please try again."); btn.disabled = false; btn.textContent = "Continue"; });
    }
    function showCodeMsg(t) { var m = el("codeMsg"); if (m) m.innerHTML = '<div class="err">' + esc(t) + "</div>"; }

    function submitEntry(btn) {
      var label = btn ? btn.textContent : "";
      var err = el("enterErr");
      if (err) err.innerHTML = "";
      if (btn) { btn.disabled = true; btn.textContent = "Entering..."; }

      fetch("/api/giveaway/enter", {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ g: state.id, subscribed: true, username: gagUsername, code: codeValidated ? macroCode : "" })
      })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, status: r.status, d: d }; }); })
        .then(function (res) {
          if (res.ok && res.d.ok) {
            fetchState().then(function () { renderModalBody(); render(); });
            return;
          }
          if (res.status === 401) { signInToEnter(); return; }
          showEnterErr(res.d.error);
          if (btn) { btn.disabled = false; btn.textContent = label; }
        })
        .catch(function () {
          showEnterErr("network");
          if (btn) { btn.disabled = false; btn.textContent = label; }
        });
    }

    function showEnterErr(code) {
      var box = el("enterErr");
      if (!box) return;
      var msgs = {
        badcode: "That macro code is invalid. Check the bottom corner of the macro.",
        subscribe: "Please confirm you subscribed to White Lion first.",
        username: "Please go back and enter your Grow a Garden username.",
        ended: "This giveaway has ended.",
        no_giveaway: "This giveaway could not be found.",
        network: "Network error, please try again."
      };
      box.innerHTML = '<div class="err">' + esc(msgs[code] || "Something went wrong, please try again.") + "</div>";
    }

    function copyText(text, btn) {
      var done = function () { var t = btn.textContent; btn.textContent = "Copied"; setTimeout(function () { btn.textContent = t; }, 1400); };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(function () { fallbackCopy(text); done(); });
      } else { fallbackCopy(text); done(); }
    }
    function fallbackCopy(text) {
      var ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(ta);
    }

    // ---- Countdown -------------------------------------------------------
    function startCountdown(endsAt) {
      if (countdownTimer) clearInterval(countdownTimer);
      function tick() {
        var diff = endsAt - Date.now();
        if (diff <= 0) { clearInterval(countdownTimer); fetchState().then(render); return; }
        var s = Math.floor(diff / 1000);
        var d = Math.floor(s / 86400); s -= d * 86400;
        var h = Math.floor(s / 3600); s -= h * 3600;
        var m = Math.floor(s / 60); s -= m * 60;
        set("cd-d", pad(d)); set("cd-h", pad(h)); set("cd-m", pad(m)); set("cd-s", pad(s));
      }
      function set(id, v) { var e = el(id); if (e) e.textContent = v; }
      function pad(n) { return (n < 10 ? "0" : "") + n; }
      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    // Light poll: only re-render the landing if the giveaway just ended or a winner was drawn.
    function startPoll() {
      setInterval(function () {
        if (!state) return;
        var prevEnded = state.ended, prevWon = state.winnerDrawn;
        fetchState().then(function (d) {
          if (d.ended !== prevEnded || d.winnerDrawn !== prevWon) render();
        }).catch(function () {});
      }, 30000);
    }

    // ---- Icons -----------------------------------------------------------
    function ytIcon() {
      return '<svg class="icon" viewBox="0 0 24 24" fill="#fff" aria-hidden="true">' +
        '<path d="M23 7.5s-.2-1.6-.9-2.3c-.9-.9-1.8-.9-2.3-1C16.6 4 12 4 12 4h0s-4.6 0-7.8.2c-.5.1-1.4.1-2.3 1C1.2 5.9 1 7.5 1 7.5S.8 9.4.8 11.3v1.4c0 1.9.2 3.8.2 3.8s.2 1.6.9 2.3c.9.9 2.1.9 2.6 1 1.9.2 7.5.2 7.5.2s4.6 0 7.8-.2c.5-.1 1.4-.1 2.3-1 .7-.7.9-2.3.9-2.3s.2-1.9.2-3.8v-1.4c0-1.9-.2-3.8-.2-3.8zM9.8 15.1V8.9l6 3.1-6 3.1z"/></svg>';
    }
    function dlIcon() {
      return '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
        '<path d="M12 3v11M7 9.5l5 5 5-5M5 20h14"/></svg>';
    }
    function tickSvg() {
      return '<div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>';
    }

    // ---- Go --------------------------------------------------------------
    load();
  </script>
</body>
</html>
